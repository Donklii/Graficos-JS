<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graficos JS — Demo</title>
  <style>
    :root {
      --bg:             #0f172a;
      --bg-elevated:    #1e293b;
      --text:           #e2e8f0;
      --text-muted:     #94a3b8;
      --rule:           #334155;
      --border:         #334155;
      --border-strong:  #475569;
      --eixo:           #475569;
      --ink-faint:      #64748b;
      --shadow-lg:      0 8px 24px rgba(0,0,0,.4);
      --raio-md:        6px;
      --positive:       #10b981;
      --negative:       #ef4444;
      --info:           #3b82f6;
      --warning:        #f59e0b;
      --fonte-ui:       system-ui, -apple-system, "Segoe UI", sans-serif;
      --fonte-mono:     ui-monospace, "Cascadia Code", Consolas, monospace;
    }

    body {
      font-family: var(--fonte-ui);
      background:  var(--bg);
      color:       var(--text);
      margin:      0;
      padding:     32px;
    }

    h1 { margin: 0 0 24px; }
    h2 { margin: 32px 0 12px; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: .08em; }

    .card {
      background:    var(--bg-elevated);
      border:        1px solid var(--border);
      border-radius: var(--raio-md);
      padding:       16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .chart-tooltip {
      position:      absolute;
      background:    var(--bg-elevated);
      border:        1px solid var(--border);
      border-radius: 6px;
      padding:       8px 10px;
      font-size:     12px;
      box-shadow:    var(--shadow-lg);
      pointer-events:none;
      z-index:       10;
    }
    .chart-axis-label { font-family: var(--fonte-mono); font-size: 10px; fill: var(--text-muted); }
    .chart-tt-title   { font-weight: 600; margin-bottom: 4px; }
    .chart-tt-row     { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .chart-tt-dot     { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .chart-tt-name    { color: var(--text-muted); margin-right: auto; }
    .chart-tt-val     { font-family: var(--fonte-mono); font-weight: 600; }

    .grafico-donut-legenda-item   { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; }
    .grafico-donut-legenda-dot    { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .grafico-donut-legenda-rotulo { color: var(--text-muted); margin-right: auto; }
    .grafico-donut-legenda-pct    { font-family: var(--fonte-mono); font-weight: 600; }

    #linha   { width: 100%; height: 280px; position: relative; }
    #colunas { width: 100%; height: 280px; }
    #donut   { width: 200px; height: 200px; }
    #spark   { width: 200px; height: 50px;  }
  </style>
</head>
<body>
  <h1>Graficos JS — Demo</h1>

  <div class="grid">
    <div>
      <h2>Linha — receita diária (mock)</h2>
      <div class="card">
        <div id="linha"></div>
      </div>
    </div>

    <div>
      <h2>Colunas — vendas por loja</h2>
      <div class="card">
        <svg id="colunas" viewBox="0 0 600 280" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <div>
      <h2>Donut — distribuição</h2>
      <div class="card" style="display:flex; align-items:center; gap:24px;">
        <svg id="donut" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="40" fill="none" stroke="var(--rule)" stroke-width="12"></circle>
        </svg>
        <div id="donut-legenda"></div>
      </div>
    </div>

    <div>
      <h2>Sparkline rico</h2>
      <div class="card">
        <svg id="spark"></svg>
      </div>
    </div>
  </div>

  <script src="../auxiliaresSvg.js"></script>
  <script src="../formatadores.js"></script>
  <script src="../dominio.js"></script>
  <script src="../eixos.js"></script>
  <script src="../series.js"></script>
  <script src="../interacao.js"></script>
  <script src="../sparkline.js"></script>
  <script src="../donut.js"></script>
  <script src="../colunas.js"></script>
  <script src="../popupGrupo.js"></script>
  <script src="../nucleo.js"></script>

  <script>
    (function () {
      const fmtMoeda = window.Grafico.Formatadores.MoedaCompacta('R$ ');
      const fmtData  = window.Grafico.Formatadores.DataCurta({ multiplicadorTimestamp: 1000 });

      // ----- Linha -----
      const baseTs = Math.floor(Date.now() / 1000) - 30 * 86400;
      const pontos = Array.from({ length: 30 }, (_, i) => ({
        x: baseTs + i * 86400,
        y: 100 + Math.sin(i / 4) * 40 + i * 3 + (Math.random() * 10),
      }));
      const grafico = window.Grafico(document.getElementById('linha'), {
        width:  600,
        height: 280,
        fmtY:   fmtMoeda,
        fmtX:   fmtData,
        fmtTooltipTitle: fmtData,
        fmtTooltipValue: (v) => fmtMoeda(v),
      });
      grafico.Renderizar({
        series: [
          { label: 'Receita', color: 'var(--info)', points: pontos, showArea: true },
        ],
      });

      // ----- Colunas -----
      window.GraficoLib.Colunas.Renderizar(document.getElementById('colunas'), {
        categorias: ['Loja A', 'Loja B', 'Loja C', 'Loja D'],
        series: [
          { rotulo: 'Faturamento', cor: 'var(--positive)', valores: [120, 180, 95, 210] },
          { rotulo: 'Custo',       cor: 'var(--warning)',  valores: [70,  90, 60,  120] },
        ],
        formatarValor:  fmtMoeda,
        mostrarValores: false,
      });

      // ----- Donut -----
      const segmentos = [
        { cor: 'var(--positive)', valor: 60, rotulo: 'Aprovado' },
        { cor: 'var(--warning)',  valor: 25, rotulo: 'Pendente' },
        { cor: 'var(--negative)', valor: 15, rotulo: 'Recusado' },
      ];
      window.Grafico.Donut.Renderizar(document.getElementById('donut'), segmentos);
      window.Grafico.Donut.RenderizarLegenda(document.getElementById('donut-legenda'), segmentos);

      // ----- Sparkline -----
      window.Grafico.Sparkline.RenderizarRico(
        document.getElementById('spark'),
        [10, 12, 8, 15, 18, 14, 22, 28, 24, 30],
        { corPositivo: 'var(--positive)', corNegativo: 'var(--negative)' },
      );
    })();
  </script>
</body>
</html>
