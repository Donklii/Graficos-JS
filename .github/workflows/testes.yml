name: Testes

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  testes:
    name: Suíte de testes (node --test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test
